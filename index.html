<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>3x3 スクラッチゲーム</title>
  <style>
    :root{
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #d8deea;
      --text: #1f2937;
      --sub: #6b7280;
      --accent: #2563eb;
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans",
                   "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap{
      width: min(96vw, 820px);
      margin: 16px auto 28px;
      padding: 14px;
    }

    .panel{
      background: var(--card);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    h1{
      margin: 0 0 8px;
      font-size: clamp(20px, 4vw, 32px);
      line-height: 1.3;
    }

    .desc{
      margin: 0 0 12px;
      color: var(--sub);
      font-size: clamp(13px, 2.8vw, 16px);
      line-height: 1.6;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap: wrap;
      align-items:center;
      margin-bottom: 14px;
    }

    button{
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      min-height: 44px;
    }

    .hint{
      color: var(--sub);
      font-size: 14px;
    }

    .board{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    .cell{
      position: relative;
      aspect-ratio: 1 / 1;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: #e5e7eb;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .cell img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display:block;
      pointer-events: none;
    }

    .cell canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      touch-action: none;
      cursor: crosshair;
    }

    .label{
      position:absolute;
      left:8px;
      bottom:8px;
      z-index: 2;
      background: rgba(0,0,0,.52);
      color: #fff;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .02em;
      pointer-events: none;
    }

    .done{
      outline: 3px solid rgba(37,99,235,.18);
      border-color: #93c5fd;
    }

    .footer-note{
      margin-top: 12px;
      color: var(--sub);
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 520px){
      .wrap{ width: 100vw; padding: 10px; }
      .panel{ padding: 12px; border-radius: 18px; }
      .board{ gap: 8px; }
      .cell{ border-radius: 14px; }
      .label{ font-size: 11px; padding: 4px 7px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>3×3 スクラッチゲーム</h1>
      <p class="desc">
        各マスを指でこすると、丸いスクラッチ層が削れて下の画像が見えるサンプルです。
        スマホ・タブレットで見やすいサイズにしてあります。
      </p>

      <div class="toolbar">
        <button id="resetBtn" type="button">全部リセット</button>
        <span class="hint">削れた割合が60%以上になると、そのマスを自動で全開放します。</span>
      </div>

      <div class="board" id="board"></div>

      <p class="footer-note">
        画像はサンプル表示です。本番ではお好きな画像URLや当選画像、キャラクター画像に差し替えて使えます。
      </p>
    </div>
  </div>

  <script>
    const imageList = [
      "https://picsum.photos/id/1015/600/600",
      "https://picsum.photos/id/1025/600/600",
      "https://picsum.photos/id/1035/600/600",
      "https://picsum.photos/id/1043/600/600",
      "https://picsum.photos/id/1050/600/600",
      "https://picsum.photos/id/1062/600/600",
      "https://picsum.photos/id/1074/600/600",
      "https://picsum.photos/id/1084/600/600",
      "https://picsum.photos/id/109/600/600"
    ];

    const board = document.getElementById("board");
    const resetBtn = document.getElementById("resetBtn");
    const cells = [];

    function createCell(index, imageUrl){
      const cell = document.createElement("div");
      cell.className = "cell";

      const img = document.createElement("img");
      img.src = imageUrl;
      img.alt = `マス ${index + 1}`;

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = `${index + 1}`;

      const canvas = document.createElement("canvas");
      cell.appendChild(img);
      cell.appendChild(label);
      cell.appendChild(canvas);
      board.appendChild(cell);

      const ctx = canvas.getContext("2d", { willReadFrequently: true });

      const state = {
        cell,
        canvas,
        ctx,
        isDrawing: false,
        revealed: false,
        brushRadius: 20
      };

      function resizeCanvas(){
        const rect = cell.getBoundingClientRect();
        const dpr = Math.max(window.devicePixelRatio || 1, 1);

        canvas.width = Math.floor(rect.width * dpr);
        canvas.height = Math.floor(rect.height * dpr);
        canvas.style.width = rect.width + "px";
        canvas.style.height = rect.height + "px";

        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);

        drawCover(rect.width, rect.height);
      }

      function drawCover(w, h){
        state.revealed = false;
        state.cell.classList.remove("done");

        ctx.clearRect(0, 0, w, h);

        const grad = ctx.createLinearGradient(0, 0, w, h);
        grad.addColorStop(0, "#cbd5e1");
        grad.addColorStop(0.5, "#94a3b8");
        grad.addColorStop(1, "#64748b");
        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);

        const dotGap = Math.max(18, w / 7);
        const dotR = Math.max(5, w / 28);

        ctx.fillStyle = "rgba(255,255,255,0.38)";
        for(let y = dotGap / 2; y < h; y += dotGap){
          for(let x = dotGap / 2; x < w; x += dotGap){
            ctx.beginPath();
            ctx.arc(x, y, dotR, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.font = `bold ${Math.max(14, w * 0.08)}px sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("SCRATCH", w / 2, h / 2);
      }

      function getPoint(e){
        const rect = canvas.getBoundingClientRect();
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top
        };
      }

      function scratch(x, y){
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;

        ctx.globalCompositeOperation = "destination-out";
        ctx.beginPath();
        ctx.arc(x, y, state.brushRadius, 0, Math.PI * 2);
        ctx.fill();

        const ratio = getRevealRatio(w, h);
        if(ratio >= 0.6 && !state.revealed){
          revealAll(w, h);
        }
      }

      function getRevealRatio(w, h){
        const step = 8;
        const imageData = ctx.getImageData(0, 0, w, h).data;
        let transparent = 0;
        let total = 0;

        for(let y = 0; y < h; y += step){
          for(let x = 0; x < w; x += step){
            const i = (y * w + x) * 4;
            const alpha = imageData[i + 3];
            total++;
            if(alpha < 20) transparent++;
          }
        }
        return transparent / total;
      }

      function revealAll(w, h){
        state.revealed = true;
        state.cell.classList.add("done");
        ctx.clearRect(0, 0, w, h);
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        state.isDrawing = true;
        canvas.setPointerCapture(e.pointerId);
        const p = getPoint(e);
        scratch(p.x, p.y);
      });

      canvas.addEventListener("pointermove", (e) => {
        if(!state.isDrawing) return;
        e.preventDefault();
        const p = getPoint(e);
        scratch(p.x, p.y);
      });

      function endDraw(e){
        state.isDrawing = false;
        try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
      }

      canvas.addEventListener("pointerup", endDraw);
      canvas.addEventListener("pointercancel", endDraw);
      canvas.addEventListener("pointerleave", endDraw);

      state.resizeCanvas = resizeCanvas;
      cells.push(state);
      resizeCanvas();
    }

    imageList.forEach((url, index) => createCell(index, url));

    let resizeTimer = null;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        cells.forEach(cell => cell.resizeCanvas());
      }, 120);
    });

    resetBtn.addEventListener("click", () => {
      cells.forEach(cell => cell.resizeCanvas());
    });
  </script>
</body>
</html>
